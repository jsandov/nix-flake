# CI gate for the nix-flake project (ARCH-03).
#
# Runs on every PR and on pushes to main. Gates merges on:
#   1. nix flake check         — evaluates flake outputs, runs checks.*
#   2. nix eval (drvPath)      — walks the ai-server module tree end-to-end
#                                without realising any derivation
#   3. statix check            — anti-pattern lint
#   4. deadnix --fail          — unused binding detector
#   5. Legacy FHS path lint    — blocks /usr/bin, /usr/sbin, /sbin (ARCH-06)
#
# Action pins use release tags; rotate to commit SHAs + enable Dependabot
# once the first green run confirms the installer/cache pair still works.
# See compliant-nix-config-vault/raw/arch-03-ci-research.md for the pin
# selection rationale and fallback plan.

name: nix-check

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: nix-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: flake check + eval + lint
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = false
            warn-dirty = false

      - name: Show Nix version
        run: |
          nix --version
          nix config show experimental-features

      - name: Generate flake.lock if missing
        # Skeleton repo ships without a committed lock because this environment
        # has no nix CLI. Once CI produces one, commit it and delete this step.
        run: |
          if [ ! -f flake.lock ]; then
            nix flake lock
          fi

      - name: nix flake check
        run: nix flake check --show-trace --no-build

      - name: Evaluate ai-server toplevel (no realisation)
        run: |
          nix eval --raw --show-trace \
            .#nixosConfigurations.ai-server.config.system.build.toplevel.drvPath

      - name: statix — anti-pattern lint
        run: nix run nixpkgs#statix -- check .

      - name: deadnix — unused binding lint
        run: nix run nixpkgs#deadnix -- --fail .

      - name: Legacy FHS path lint — module and host code (ARCH-06)
        # NixOS does not populate /usr/bin, /usr/sbin, or /sbin. Any reference
        # in real config code is almost certainly a copy-pasted Linux-FHS path
        # that will silently fail at runtime. Replace with
        # /run/current-system/sw/bin (standard binaries), /run/wrappers/bin
        # (setuid wrappers), or an explicit Nix store path.
        run: |
          set -u
          if grep -rnE '/(usr/bin|usr/sbin|sbin)/' modules/ hosts/ 2>/dev/null; then
            echo "::error::Found legacy FHS paths in modules/ or hosts/"
            exit 1
          fi

      - name: Legacy FHS path lint — PRD audit-rule syntax (ARCH-06)
        # PRD files contain legitimate descriptive references to /usr/bin
        # etc. ("these paths do not exist on NixOS", "DO NOT monitor",
        # shebangs). This lint is narrower than the module/host one: it
        # matches only the quoted audit-rule syntax `"-w /usr/bin/..."`
        # that denotes an actual broken auditd rule. Descriptive prose
        # is allowed; broken rules are not.
        run: |
          set -u
          if grep -rnE '"-w /(usr/bin|usr/sbin|sbin)/' docs/ 2>/dev/null; then
            echo "::error::Found audit rules referencing FHS paths that do not exist on NixOS — use /run/wrappers/bin or /run/current-system/sw/bin"
            exit 1
          fi

      - name: Secrets-in-Nix-store leakage lint (ARCH-07)
        # The Nix store is world-readable. A secret embedded in a Nix
        # expression ends up in /nix/store with 0444 perms — readable
        # by every user and process, persisted until garbage collection,
        # and not securely wiped even then. See
        # wiki/nixos-platform/nixos-gotchas.md #1 and
        # wiki/shared-controls/secrets-management.md.
        #
        # Three heuristic patterns that cover the most common leaks:
        #
        # (a) PEM content embedded in a Nix builder function. A leaked
        #     private key or certificate is almost always visible on one
        #     line containing `-----BEGIN` together with a `writeText` or
        #     `toFile` call.
        #
        # (b) Long hex runs (40+ chars) embedded in a writeText/toFile
        #     call. Catches sha1/sha256-shaped tokens and long bearer
        #     tokens. Legitimate hashes (nixpkgs pin SHAs, narHash, etc.)
        #     live in `flake.lock` and input declarations, not inside
        #     writeText bodies — so the false-positive rate in modules/
        #     and hosts/ is acceptably low.
        #
        # (c) Literal-value assignment to an env var whose name signals a
        #     secret (TOKEN, SECRET, PASSWORD, PRIVATE_KEY, API_KEY,
        #     AUTH_KEY). Allows values that start with `$` (string
        #     interpolation pulling from `config.sops.secrets.*.path`),
        #     empty strings, and `null`.
        #
        # Scope: modules/ and hosts/ only. PRDs get illustrative snippets
        # which can contain example secrets; that's handled by prd-snippet
        # -tiers review. True eval-based introspection is ARCH-17's job.
        run: |
          set -u
          failed=0

          if grep -rnE '(pkgs\.writeText|builtins\.toFile)[^)]*-----BEGIN' modules/ hosts/ 2>/dev/null; then
            echo "::error::PEM block embedded in pkgs.writeText / builtins.toFile — move to config.sops.secrets.<name>"
            failed=1
          fi

          if grep -rnE '(pkgs\.writeText|builtins\.toFile)[^)]*[A-Fa-f0-9]{40}' modules/ hosts/ 2>/dev/null; then
            echo "::error::Long hex token (40+ chars) in pkgs.writeText / builtins.toFile — move to config.sops.secrets.<name>"
            failed=1
          fi

          if grep -rnE '(TOKEN|SECRET|PASSWORD|PRIVATE_KEY|API_KEY|AUTH_KEY)[A-Z_]*[[:space:]]*=[[:space:]]*"[^$"][^"]*"' modules/ hosts/ 2>/dev/null; then
            echo "::error::Literal-value secret-named env var — use config.sops.secrets.<name>.path via interpolation"
            failed=1
          fi

          exit $failed
